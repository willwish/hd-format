<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HD Viewer</title>
<style>
  :root {
    --bg: #ffffff; --bg-soft: #f6f7f9; --fg: #1f2328; --fg-soft: #57606a;
    --border: #d8dee4; --accent: #2563eb; --accent-soft: #dbeafe;
    --code-bg: #f0f2f5; --shadow: 0 1px 3px rgba(0,0,0,.08);
    --note: #6b7280; --info: #2563eb; --tip: #16a34a; --warning: #d97706; --danger: #dc2626;
  }
  [data-theme="dark"] {
    --bg: #14171c; --bg-soft: #1c2026; --fg: #e6e9ee; --fg-soft: #9aa4b2;
    --border: #30363d; --accent: #60a5fa; --accent-soft: #1e3a5f;
    --code-bg: #22272e; --shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang HK", "Microsoft JhengHei", sans-serif;
    font-size: 16px; line-height: 1.65;
  }
  /* ---------- chrome ---------- */
  #topbar {
    position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; background: var(--bg-soft); border-bottom: 1px solid var(--border);
  }
  #topbar .doc-title { font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #topbar button {
    background: var(--bg); color: var(--fg); border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 12px; font-size: 13px; cursor: pointer;
  }
  #topbar button:hover { border-color: var(--accent); color: var(--accent); }
  #layout { display: flex; max-width: 1200px; margin: 0 auto; }
  #toc {
    width: 230px; flex-shrink: 0; position: sticky; top: 49px; align-self: flex-start;
    max-height: calc(100vh - 49px); overflow-y: auto; padding: 24px 8px 24px 16px;
    font-size: 13.5px; display: none;
  }
  #toc.visible { display: block; }
  #toc .toc-head { font-weight: 600; color: var(--fg-soft); text-transform: uppercase; font-size: 11px; letter-spacing: .06em; margin-bottom: 8px; }
  #toc a { display: block; color: var(--fg-soft); text-decoration: none; padding: 3px 8px; border-radius: 5px; border-left: 2px solid transparent; }
  #toc a:hover { color: var(--accent); background: var(--bg-soft); }
  #toc a.lvl-3 { padding-left: 22px; font-size: 12.5px; }
  #doc-wrap { flex: 1; min-width: 0; }
  article#doc { max-width: 780px; margin: 0 auto; padding: 36px 28px 90px; }
  #welcome { max-width: 560px; margin: 80px auto; text-align: center; color: var(--fg-soft); padding: 0 20px; }
  #welcome .big { font-size: 42px; }
  #welcome h1 { color: var(--fg); font-size: 24px; margin: 12px 0 6px; }
  #welcome .dropzone { border: 2px dashed var(--border); border-radius: 14px; padding: 36px 20px; margin-top: 24px; }
  body.dragging #welcome .dropzone, body.dragging #topbar { border-color: var(--accent); }
  #plugin-banner {
    display: none; max-width: 780px; margin: 16px auto 0; padding: 10px 16px;
    background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 8px; font-size: 14px;
  }
  #plugin-banner button { margin-left: 10px; }
  /* ---------- document typography ---------- */
  #doc h1 { font-size: 2em; line-height: 1.25; margin: 0 0 .5em; letter-spacing: -.01em; }
  #doc h2 { font-size: 1.45em; margin: 1.8em 0 .6em; padding-bottom: .25em; border-bottom: 1px solid var(--border); }
  #doc h3 { font-size: 1.18em; margin: 1.5em 0 .5em; }
  #doc h4, #doc h5, #doc h6 { margin: 1.3em 0 .4em; }
  #doc .doc-meta { color: var(--fg-soft); font-size: 13.5px; margin: -4px 0 28px; }
  #doc p { margin: .9em 0; }
  #doc a { color: var(--accent); }
  #doc img { max-width: 100%; border-radius: 8px; }
  #doc blockquote { margin: 1em 0; padding: 2px 18px; border-left: 3px solid var(--border); color: var(--fg-soft); }
  #doc code, #doc kbd { background: var(--code-bg); border-radius: 5px; padding: 2px 6px; font-size: .875em; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  #doc pre { background: var(--code-bg); border-radius: 10px; padding: 14px 18px; overflow-x: auto; line-height: 1.5; }
  #doc pre code { background: none; padding: 0; }
  #doc hr { border: none; border-top: 1px solid var(--border); margin: 2.2em 0; }
  #doc table { border-collapse: collapse; width: 100%; margin: 1.2em 0; font-size: .94em; }
  #doc th, #doc td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; }
  #doc th { background: var(--bg-soft); }
  #doc figure { margin: 1.4em 0; }
  #doc figcaption { color: var(--fg-soft); font-size: .85em; text-align: center; margin-top: 6px; }
  /* ---------- components ---------- */
  .hd-callout { display: flex; gap: 12px; margin: 1.2em 0; padding: 13px 16px; border-radius: 10px; border: 1px solid; background: var(--bg-soft); }
  .hd-callout .ico { font-size: 18px; line-height: 1.4; }
  .hd-callout .body > :first-child { margin-top: 0; } .hd-callout .body > :last-child { margin-bottom: 0; }
  .hd-callout .c-title { font-weight: 600; margin-bottom: 2px; }
  .hd-callout.note    { border-color: var(--note);    } .hd-callout.note    .c-title { color: var(--note); }
  .hd-callout.info    { border-color: var(--info);    } .hd-callout.info    .c-title { color: var(--info); }
  .hd-callout.tip     { border-color: var(--tip);     } .hd-callout.tip     .c-title { color: var(--tip); }
  .hd-callout.warning { border-color: var(--warning); } .hd-callout.warning .c-title { color: var(--warning); }
  .hd-callout.danger  { border-color: var(--danger);  } .hd-callout.danger  .c-title { color: var(--danger); }
  .hd-tabs { margin: 1.4em 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .hd-tabs .tab-nav { display: flex; flex-wrap: wrap; background: var(--bg-soft); border-bottom: 1px solid var(--border); }
  .hd-tabs .tab-nav button {
    background: none; border: none; border-bottom: 2px solid transparent; color: var(--fg-soft);
    padding: 9px 18px; font-size: 14px; cursor: pointer; font-weight: 500;
  }
  .hd-tabs .tab-nav button.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg); }
  .hd-tabs .tab-panel { padding: 4px 18px; display: none; }
  .hd-tabs .tab-panel.active { display: block; }
  .hd-details { margin: 1.2em 0; border: 1px solid var(--border); border-radius: 10px; }
  .hd-details summary { padding: 11px 16px; font-weight: 600; cursor: pointer; }
  .hd-details .d-body { padding: 0 16px 12px; }
  .hd-chart { margin: 1.6em 0; }
  .hd-chart .chart-title { font-weight: 600; text-align: center; margin-bottom: 6px; }
  .hd-chart svg { display: block; max-width: 100%; height: auto; margin: 0 auto; }
  .hd-chart .legend { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; font-size: 13px; color: var(--fg-soft); margin-top: 8px; }
  .hd-chart .legend .sw { display: inline-block; width: 11px; height: 11px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }
  .hd-mermaid { margin: 1.6em 0; text-align: center; overflow-x: auto; }
  .hd-error { margin: 1.2em 0; padding: 12px 16px; border: 1px solid var(--danger); border-radius: 10px; background: var(--bg-soft); font-size: 14px; }
  .hd-error .e-title { color: var(--danger); font-weight: 600; margin-bottom: 4px; }
  .hd-error pre { margin: 8px 0 0; max-height: 180px; overflow: auto; }
  .hd-placeholder { margin: 1.2em 0; padding: 16px; border: 1px dashed var(--border); border-radius: 10px; color: var(--fg-soft); font-size: 14px; text-align: center; }
  .hd-placeholder code { background: var(--code-bg); padding: 2px 6px; border-radius: 5px; }
  @media (max-width: 900px) { #toc { display: none !important; } }
  @media print { #topbar, #toc, #plugin-banner { display: none !important; } article#doc { max-width: none; padding: 0; } }
</style>
</head>
<body>

<header id="topbar">
  <span class="doc-title" id="doc-title">HD Viewer</span>
  <button id="btn-open">Open .hd</button>
  <button id="btn-plugin" title="Load a component plugin (.js)">Load plugin</button>
  <button id="btn-sample">Sample</button>
  <button id="btn-theme" title="Toggle theme">◐</button>
  <input type="file" id="file-doc" accept=".hd,.html,.txt" hidden>
  <input type="file" id="file-plugin" accept=".js" multiple hidden>
</header>

<div id="plugin-banner">
  <span id="plugin-banner-text"></span>
  <button id="btn-banner-load">Load plugin file(s)…</button>
</div>

<div id="layout">
  <nav id="toc"></nav>
  <div id="doc-wrap">
    <div id="welcome">
      <div class="big">📄</div>
      <h1>HD Viewer</h1>
      <p>A reader for <strong>.hd</strong> documents — rich, designed, AI-editable text documents.</p>
      <div class="dropzone">Drag &amp; drop a <code>.hd</code> file anywhere on this page,<br>
        or use <strong>Open .hd</strong> above. Try the <strong>Sample</strong> to see what HD can do.</div>
    </div>
    <article id="doc" hidden></article>
  </div>
</div>

<!-- ====================== embedded sample document ====================== -->
<script type="text/plain" id="sample-doc">
<!hd 1.0>
<hd-doc title="Welcome to HD" author="HD Project" date="2026-06-12" theme="auto">

  <hd-use name="mindmap" src="plugins/mindmap.hd.js"></hd-use>

  <hd-body>

    <h1>Welcome to HD</h1>

    <p><strong>HD</strong> is a text document format that keeps the simplicity of Markdown
    but renders with real design — and supports rich components like the ones below.
    The source of this page is plain, readable text that an AI can edit directly.</p>

    <hd-callout type="tip" title="Why HD?">
      <p>Markdown source is easy to edit but plain to read. Full HTML renders nicely but is
      messy to edit. HD is both: a small HTML subset plus declarative components.</p>
    </hd-callout>

    <h2>Charts — built in, no dependencies</h2>

    <hd-chart type="bar" title="Revenue by quarter (HK$M)" height="300">
    {
      "labels": ["Q1", "Q2", "Q3", "Q4"],
      "series": [
        { "name": "2025", "data": [120, 150, 170, 210] },
        { "name": "2026", "data": [140, 180, 205, 240] }
      ]
    }
    </hd-chart>

    <hd-chart type="pie" title="Traffic sources" height="260">
    {
      "labels": ["Search", "Direct", "Social", "Referral"],
      "series": [ { "name": "Share", "data": [44, 28, 17, 11] } ]
    }
    </hd-chart>

    <h2>Tabs and collapsible sections</h2>

    <hd-tabs>
      <hd-tab title="For readers">
        <p>Documents get typography, callouts, charts and diagrams — far easier to read
        than a wall of Markdown output.</p>
      </hd-tab>
      <hd-tab title="For AI">
        <p>Strict tags and declarative JSON data mean an AI can edit any part of a document
        with simple text operations — no code generation needed.</p>
      </hd-tab>
      <hd-tab title="For developers">
        <p>New components are plugins: one JS file registering a tag. Documents stay inert data.</p>
      </hd-tab>
    </hd-tabs>

    <hd-details title="How does the security model work?">
      <p>Documents are sanitized through a whitelist — no scripts, styles or event handlers
      survive. All code lives in plugins, which you approve explicitly.</p>
    </hd-details>

    <h2>Diagrams</h2>

    <hd-mermaid>
flowchart LR
  A[.hd file] --> B(Parse + sanitize)
  B --> C{hd-* tag?}
  C -->|built-in| D[Render component]
  C -->|plugin| E[Plugin renderer]
  C -->|HTML subset| F[Typeset]
    </hd-mermaid>

    <h2>Extensions</h2>

    <p>The mindmap below comes from a <em>plugin</em> — it is not built into the viewer.
    Use <strong>Load plugin</strong> and pick <code>plugins/mindmap.hd.js</code> to see it render.</p>

    <hd-mindmap title="HD format">
- HD
  - Content
    - HTML subset
    - Components
  - Built-ins
    - Charts
    - Mermaid
    - Callouts, tabs
  - Extensions
    - Custom tags
    - Plugin = 1 JS file
    </hd-mindmap>

    <h2>Plain HTML still works</h2>

    <table>
      <thead><tr><th>Feature</th><th>Markdown</th><th>HD</th></tr></thead>
      <tbody>
        <tr><td>Easy to edit / diff</td><td>Yes</td><td>Yes</td></tr>
        <tr><td>Designed output</td><td>No</td><td>Yes</td></tr>
        <tr><td>Charts, tabs, mindmaps</td><td>No</td><td>Yes</td></tr>
        <tr><td>Safe to open</td><td>Yes</td><td>Yes — sandboxed by design</td></tr>
      </tbody>
    </table>

    <hd-callout type="info" title="Edit me">
      <p>Open this file in any text editor — or ask an AI to add a section. That is the point.</p>
    </hd-callout>

  </hd-body>
</hd-doc>
</script>

<script>
"use strict";
/* =========================================================================
   HD Viewer 1.0 — single-file renderer for .hd documents.  See docs/HD-SPEC.md
   ========================================================================= */

/* ---------- component registry (public extension API) ---------- */
const HD = {
  specVersion: "1.0",
  components: Object.create(null),
  register(tag, def) {
    if (!tag || typeof def !== "object" || typeof def.render !== "function")
      throw new Error("HD.register(tag, {render}) — invalid arguments");
    this.components[String(tag).toLowerCase()] = def;
    scheduleRerender();
  }
};
window.HD = HD;

/* ---------- sanitizer whitelist (spec §3) ---------- */
const ALLOWED_TAGS = new Set([
  "h1","h2","h3","h4","h5","h6",
  "p","blockquote","pre","hr","section","div","figure","figcaption",
  "ul","ol","li","dl","dt","dd",
  "table","thead","tbody","tfoot","tr","th","td","caption",
  "a","strong","em","b","i","u","s","mark","code","kbd","sup","sub","span","br",
  "img"
]);
const DROP_WITH_CHILDREN = new Set([
  "script","style","iframe","object","embed","form","input","button",
  "select","textarea","link","meta","base","template","video","audio","source"
]);
const GLOBAL_ATTRS = new Set(["id","class","title"]);
const TAG_ATTRS = {
  a: ["href"], img: ["src","alt","width","height"],
  th: ["colspan","rowspan","align"], td: ["colspan","rowspan","align"], ol: ["start"]
};
function safeUrl(value, allowDataImage) {
  const v = String(value || "").trim();
  if (/^(https?:|mailto:|#)/i.test(v)) return v;
  if (allowDataImage && /^data:image\//i.test(v)) return v;
  return null;
}
function copyAttrs(src, dst) {
  const tag = dst.tagName.toLowerCase();
  for (const a of src.attributes) {
    const n = a.name.toLowerCase();
    if (n.startsWith("on")) continue;
    if (GLOBAL_ATTRS.has(n)) { dst.setAttribute(n, a.value); continue; }
    if ((TAG_ATTRS[tag] || []).includes(n)) {
      if (n === "href") { const u = safeUrl(a.value, false); if (u) dst.setAttribute("href", u); }
      else if (n === "src") { const u = safeUrl(a.value, true); if (u) dst.setAttribute("src", u); }
      else dst.setAttribute(n, a.value);
    }
  }
  if (tag === "a" && dst.getAttribute("href") && !dst.getAttribute("href").startsWith("#"))
    { dst.setAttribute("target", "_blank"); dst.setAttribute("rel", "noopener noreferrer"); }
}

/* ---------- ctx helpers passed to component renderers (spec §6.1) ---------- */
function makeCtx() {
  return {
    sanitize(el) {
      const frag = document.createDocumentFragment();
      for (const child of el.childNodes) { const n = sanitizeNode(child); if (n) frag.appendChild(n); }
      return frag;
    },
    h(tag, attrs, ...children) {
      const el = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs || {})) {
        if (k === "class") el.className = v; else el.setAttribute(k, v);
      }
      for (const c of children.flat())
        if (c != null) el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
      return el;
    },
    svg(tag, attrs) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      for (const [k, v] of Object.entries(attrs || {})) {
        // CSS var() is invalid in SVG presentation attributes — route via style
        if ((k === "fill" || k === "stroke") && String(v).includes("var("))
          el.style[k] = v;
        else el.setAttribute(k, v);
      }
      return el;
    },
    error: errorBox,
    get theme() { return currentTheme(); }
  };
}
function errorBox(message, source) {
  const box = document.createElement("div");
  box.className = "hd-error";
  const t = document.createElement("div"); t.className = "e-title"; t.textContent = "⚠ " + message;
  box.appendChild(t);
  if (source) { const pre = document.createElement("pre"); pre.textContent = source; box.appendChild(pre); }
  return box;
}

/* ---------- core sanitize / render walk ---------- */
function sanitizeNode(node) {
  if (node.nodeType === Node.TEXT_NODE) return document.createTextNode(node.nodeValue);
  if (node.nodeType !== Node.ELEMENT_NODE) return null;
  const tag = node.tagName.toLowerCase();

  if (tag.startsWith("hd-")) return renderComponent(tag, node);
  if (DROP_WITH_CHILDREN.has(tag)) return null;
  if (!ALLOWED_TAGS.has(tag)) {
    // unknown plain tag: keep its (sanitized) children, drop the wrapper
    const frag = document.createDocumentFragment();
    for (const child of node.childNodes) { const n = sanitizeNode(child); if (n) frag.appendChild(n); }
    return frag;
  }
  const out = document.createElement(tag);
  copyAttrs(node, out);
  for (const child of node.childNodes) { const n = sanitizeNode(child); if (n) out.appendChild(n); }
  return out;
}
function renderComponent(tag, el) {
  if (tag === "hd-use" || tag === "hd-body" || tag === "hd-doc") {
    // structural tags encountered inline: render children (tolerates nesting quirks)
    const frag = document.createDocumentFragment();
    for (const child of el.childNodes) { const n = sanitizeNode(child); if (n) frag.appendChild(n); }
    return frag;
  }
  const def = HD.components[tag];
  if (!def) {
    const ph = document.createElement("div");
    ph.className = "hd-placeholder";
    ph.innerHTML = "Component <code></code> needs a plugin — use <strong>Load plugin</strong> above.";
    ph.querySelector("code").textContent = "<" + tag + ">";
    return ph;
  }
  try { return def.render(el, makeCtx()) || document.createDocumentFragment(); }
  catch (e) { return errorBox("<" + tag + "> failed to render: " + e.message); }
}

/* =========================================================================
   Built-in components (spec §5)
   ========================================================================= */
HD.components["hd-callout"] = { render(el, ctx) {
  const type = (el.getAttribute("type") || "note").toLowerCase();
  const icons = { note: "✏️", info: "ℹ️", tip: "💡", warning: "⚠️", danger: "⛔" };
  const valid = icons[type] ? type : "note";
  const body = ctx.h("div", { class: "body" });
  const title = el.getAttribute("title");
  if (title) body.appendChild(ctx.h("div", { class: "c-title" }, title));
  body.appendChild(ctx.sanitize(el));
  return ctx.h("div", { class: "hd-callout " + valid },
    ctx.h("div", { class: "ico" }, icons[valid]), body);
}};

HD.components["hd-details"] = { render(el, ctx) {
  const d = document.createElement("details");
  d.className = "hd-details";
  if (el.hasAttribute("open")) d.open = true;
  d.appendChild(ctx.h("summary", {}, el.getAttribute("title") || "Details"));
  const body = ctx.h("div", { class: "d-body" }); body.appendChild(ctx.sanitize(el));
  d.appendChild(body);
  return d;
}};

HD.components["hd-tabs"] = { render(el, ctx) {
  const tabs = [...el.children].filter(c => c.tagName.toLowerCase() === "hd-tab");
  if (!tabs.length) return ctx.error("<hd-tabs> contains no <hd-tab> children");
  const root = ctx.h("div", { class: "hd-tabs" });
  const nav = ctx.h("div", { class: "tab-nav" });
  const panels = [];
  let active = Math.max(0, tabs.findIndex(t => t.hasAttribute("active")));
  tabs.forEach((tab, i) => {
    const btn = ctx.h("button", {}, tab.getAttribute("title") || "Tab " + (i + 1));
    btn.addEventListener("click", () => {
      nav.querySelectorAll("button").forEach((b, j) => b.classList.toggle("active", j === i));
      panels.forEach((p, j) => p.classList.toggle("active", j === i));
    });
    nav.appendChild(btn);
    const panel = ctx.h("div", { class: "tab-panel" }); panel.appendChild(ctx.sanitize(tab));
    panels.push(panel);
  });
  nav.children[active].classList.add("active");
  panels[active].classList.add("active");
  root.appendChild(nav); panels.forEach(p => root.appendChild(p));
  return root;
}};

/* ---------- hd-chart: declarative JSON -> SVG ---------- */
const PALETTE = ["#4e79a7","#f28e2b","#59a14f","#e15759","#b07aa1","#76b7b2","#edc949","#ff9da7"];
HD.components["hd-chart"] = { render(el, ctx) {
  const type = (el.getAttribute("type") || "bar").toLowerCase();
  const height = Math.min(800, parseInt(el.getAttribute("height") || "300", 10) || 300);
  let data;
  try { data = JSON.parse(el.textContent); }
  catch (e) { return ctx.error("hd-chart: invalid JSON — " + e.message, el.textContent.trim()); }
  const labels = data.labels, series = data.series;
  if (!Array.isArray(labels) || !Array.isArray(series) || !series.length ||
      series.some(s => !Array.isArray(s.data)))
    return ctx.error('hd-chart: body must be {"labels":[...],"series":[{"name":...,"data":[...]}]}', el.textContent.trim());

  const root = ctx.h("div", { class: "hd-chart" });
  const title = el.getAttribute("title");
  if (title) root.appendChild(ctx.h("div", { class: "chart-title" }, title));
  const colorOf = (s, i) => s.color || PALETTE[i % PALETTE.length];

  if (type === "pie") {
    root.appendChild(pieSVG(ctx, labels, series[0], height));
  } else {
    root.appendChild(xySVG(ctx, type, labels, series, height, colorOf));
  }
  if (type === "pie" || series.length > 1) {
    const legend = ctx.h("div", { class: "legend" });
    const items = type === "pie" ? labels.map((l, i) => [l, PALETTE[i % PALETTE.length]])
                                 : series.map((s, i) => [s.name || "Series " + (i + 1), colorOf(s, i)]);
    for (const [name, color] of items) {
      const sw = ctx.h("span", { class: "sw" }); sw.style.background = color;
      legend.appendChild(ctx.h("span", {}, sw, String(name)));
    }
    root.appendChild(legend);
  }
  return root;
}};
function niceMax(v) {
  if (v <= 0) return 1;
  const p = Math.pow(10, Math.floor(Math.log10(v)));
  for (const m of [1, 2, 2.5, 5, 10]) if (v <= m * p) return m * p;
  return 10 * p;
}
function xySVG(ctx, type, labels, series, H, colorOf) {
  const W = 680, m = { t: 16, r: 16, b: 44, l: 52 };
  const pw = W - m.l - m.r, ph = H - m.t - m.b;
  const svg = ctx.svg("svg", { viewBox: `0 0 ${W} ${H}`, width: W, height: H, role: "img" });
  const axis = "var(--fg-soft)", grid = "var(--border)";
  const max = niceMax(Math.max(1e-9, ...series.flatMap(s => s.data.map(Number).filter(isFinite))));
  const steps = 4;
  for (let i = 0; i <= steps; i++) {
    const y = m.t + ph - (ph * i) / steps;
    const line = ctx.svg("line", { x1: m.l, y1: y, x2: m.l + pw, y2: y, stroke: grid, "stroke-width": i === 0 ? 1.5 : 1 });
    if (i > 0) line.setAttribute("stroke-dasharray", "3,3");
    svg.appendChild(line);
    const t = ctx.svg("text", { x: m.l - 8, y: y + 4, "text-anchor": "end", "font-size": 11, fill: axis });
    t.textContent = formatNum((max * i) / steps); svg.appendChild(t);
  }
  const slot = pw / labels.length;
  labels.forEach((lab, i) => {
    const t = ctx.svg("text", { x: m.l + slot * (i + 0.5), y: H - m.b + 18, "text-anchor": "middle", "font-size": 11.5, fill: axis });
    t.textContent = truncate(String(lab), 14); svg.appendChild(t);
  });
  if (type === "line") {
    series.forEach((s, si) => {
      const color = colorOf(s, si);
      const pts = s.data.map((v, i) => [m.l + slot * (i + 0.5), m.t + ph - (ph * Number(v)) / max]);
      svg.appendChild(ctx.svg("polyline", {
        points: pts.map(p => p.map(n => n.toFixed(1)).join(",")).join(" "),
        fill: "none", stroke: color, "stroke-width": 2.5, "stroke-linejoin": "round"
      }));
      for (const [x, y] of pts) svg.appendChild(ctx.svg("circle", { cx: x.toFixed(1), cy: y.toFixed(1), r: 3.5, fill: color }));
    });
  } else { // bar
    const groupW = slot * 0.72, barW = groupW / series.length;
    series.forEach((s, si) => {
      const color = colorOf(s, si);
      s.data.forEach((v, i) => {
        const h = (ph * Number(v)) / max;
        if (!isFinite(h)) return;
        svg.appendChild(ctx.svg("rect", {
          x: (m.l + slot * i + (slot - groupW) / 2 + barW * si).toFixed(1),
          y: (m.t + ph - Math.max(0, h)).toFixed(1),
          width: Math.max(1, barW - 2).toFixed(1), height: Math.max(0, h).toFixed(1),
          fill: color, rx: 2
        }));
      });
    });
  }
  return svg;
}
function pieSVG(ctx, labels, s0, H) {
  const W = 680, cx = W / 2, cy = H / 2, r = Math.min(W, H) / 2 - 16;
  const svg = ctx.svg("svg", { viewBox: `0 0 ${W} ${H}`, width: W, height: H, role: "img" });
  const vals = s0.data.map(Number).map(v => (isFinite(v) && v > 0 ? v : 0));
  const total = vals.reduce((a, b) => a + b, 0);
  if (!total) { svg.appendChild(ctx.svg("circle", { cx, cy, r, fill: "var(--border)" })); return svg; }
  let angle = -Math.PI / 2;
  vals.forEach((v, i) => {
    const frac = v / total;
    if (frac <= 0) return;
    const color = PALETTE[i % PALETTE.length];
    if (frac >= 0.9999) { svg.appendChild(ctx.svg("circle", { cx, cy, r, fill: color })); return; }
    const a2 = angle + frac * 2 * Math.PI;
    const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
    const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
    svg.appendChild(ctx.svg("path", {
      d: `M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${frac > 0.5 ? 1 : 0} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`,
      fill: color, stroke: "var(--bg)", "stroke-width": 1.5
    }));
    const mid = (angle + a2) / 2, lr = r * 0.62;
    if (frac > 0.06) {
      const t = ctx.svg("text", {
        x: (cx + lr * Math.cos(mid)).toFixed(1), y: (cy + lr * Math.sin(mid)).toFixed(1),
        "text-anchor": "middle", "font-size": 12, fill: "#fff", "font-weight": 600
      });
      t.textContent = Math.round(frac * 100) + "%"; svg.appendChild(t);
    }
    angle = a2;
  });
  return svg;
}
function formatNum(v) { return Math.abs(v) >= 1000 ? Number(v.toFixed(0)).toLocaleString() : String(Number(v.toFixed(2))); }
function truncate(s, n) { return s.length > n ? s.slice(0, n - 1) + "…" : s; }

/* ---------- hd-mermaid: lazy-load Mermaid from CDN, graceful fallback ---------- */
let mermaidPromise = null, mermaidSeq = 0;
function loadMermaid() {
  if (window.mermaid) return Promise.resolve(window.mermaid);
  if (mermaidPromise) return mermaidPromise;
  mermaidPromise = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js";
    s.onload = () => {
      try {
        window.mermaid.initialize({ startOnLoad: false, securityLevel: "strict",
          theme: currentTheme() === "dark" ? "dark" : "default" });
        resolve(window.mermaid);
      } catch (e) { reject(e); }
    };
    s.onerror = () => { mermaidPromise = null; reject(new Error("Could not load Mermaid (offline?)")); };
    document.head.appendChild(s);
  });
  return mermaidPromise;
}
HD.components["hd-mermaid"] = { render(el, ctx) {
  const code = el.textContent.trim();
  const holder = ctx.h("div", { class: "hd-mermaid" }, "Rendering diagram…");
  loadMermaid()
    .then(m => m.render("hd-mmd-" + (++mermaidSeq), code))
    .then(({ svg }) => { holder.innerHTML = svg; })            // SVG produced by Mermaid itself
    .catch(e => {
      holder.textContent = "";
      holder.appendChild(ctx.error("Diagram not rendered (" + e.message + ") — source below:", code));
    });
  return holder;
}};

/* =========================================================================
   Document loading / parsing / page rendering
   ========================================================================= */
let lastSource = null, lastName = null, rerenderQueued = false;
function scheduleRerender() {
  if (!lastSource || rerenderQueued) return;
  rerenderQueued = true;
  setTimeout(() => { rerenderQueued = false; renderDocument(lastSource, lastName); }, 0);
}

function renderDocument(text, name) {
  lastSource = text; lastName = name || "document.hd";
  const header = text.match(/^﻿?\s*<!hd\s+([\d.]+)\s*>/i);
  const body = header ? text.slice(text.indexOf(">", text.search(/<!hd/i)) + 1) : text;
  const srcDoc = new DOMParser().parseFromString(body, "text/html");
  const docEl = srcDoc.querySelector("hd-doc");
  const bodyEl = srcDoc.querySelector("hd-body");
  const article = document.getElementById("doc");
  article.textContent = "";

  if (!header) article.appendChild(errorBox("Missing <!hd 1.0> header — rendering anyway."));
  if (!docEl || !bodyEl) {
    article.appendChild(errorBox("Not a valid HD document: <hd-doc> / <hd-body> not found."));
    show(article); return;
  }

  // title + meta line
  const title = docEl.getAttribute("title") || lastName;
  document.title = title + " — HD Viewer";
  document.getElementById("doc-title").textContent = title;
  const metaBits = [docEl.getAttribute("author"), docEl.getAttribute("date")].filter(Boolean);
  if (metaBits.length) {
    const meta = document.createElement("p");
    meta.className = "doc-meta"; meta.textContent = metaBits.join(" · ");
    article.appendChild(meta);
  }
  const docTheme = (docEl.getAttribute("theme") || "auto").toLowerCase();
  applyTheme(userTheme || docTheme);

  // content
  for (const child of bodyEl.childNodes) { const n = sanitizeNode(child); if (n) article.appendChild(n); }

  show(article);
  buildToc(article);
  checkPlugins(srcDoc);
}
function show(article) {
  document.getElementById("welcome").hidden = true;
  article.hidden = false;
}

/* ---------- table of contents ---------- */
function buildToc(article) {
  const toc = document.getElementById("toc");
  toc.textContent = "";
  const heads = [...article.querySelectorAll("h2, h3")];
  if (heads.length < 2) { toc.classList.remove("visible"); return; }
  const used = new Set();
  toc.appendChild(Object.assign(document.createElement("div"), { className: "toc-head", textContent: "Contents" }));
  for (const h of heads) {
    let id = h.id || h.textContent.trim().toLowerCase().replace(/[^\w一-鿿]+/g, "-").replace(/^-+|-+$/g, "") || "section";
    while (used.has(id)) id += "-x";
    used.add(id); h.id = id;
    const a = document.createElement("a");
    a.href = "#" + id; a.textContent = h.textContent;
    a.className = "lvl-" + h.tagName[1];
    toc.appendChild(a);
  }
  toc.classList.add("visible");
}

/* ---------- plugins (spec §6.3) ---------- */
function checkPlugins(srcDoc) {
  const missing = [...srcDoc.querySelectorAll("hd-use")]
    .map(u => ({ name: (u.getAttribute("name") || "").toLowerCase(), src: u.getAttribute("src") }))
    .filter(u => u.name && !HD.components["hd-" + u.name]);
  const banner = document.getElementById("plugin-banner");
  if (!missing.length) { banner.style.display = "none"; return; }
  document.getElementById("plugin-banner-text").textContent =
    "This document uses extension" + (missing.length > 1 ? "s" : "") + ": " +
    missing.map(m => m.name).join(", ") + ".";
  banner.style.display = "block";
}
function executePlugin(code, name) {
  try { new Function(code)(); }
  catch (e) { alert("Plugin " + (name || "") + " failed: " + e.message); }
}
function pickPlugins() { document.getElementById("file-plugin").click(); }

/* ---------- theme ---------- */
let userTheme = null;
try { userTheme = localStorage.getItem("hd-theme") || null; } catch (e) {}
function currentTheme() { return document.documentElement.getAttribute("data-theme") || "light"; }
function applyTheme(pref) {
  const dark = pref === "dark" || (pref !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
}
applyTheme(userTheme || "auto");

/* ---------- UI wiring ---------- */
document.getElementById("btn-open").addEventListener("click", () => document.getElementById("file-doc").click());
document.getElementById("btn-plugin").addEventListener("click", pickPlugins);
document.getElementById("btn-banner-load").addEventListener("click", pickPlugins);
document.getElementById("btn-sample").addEventListener("click", () =>
  renderDocument(document.getElementById("sample-doc").textContent, "sample.hd"));
document.getElementById("btn-theme").addEventListener("click", () => {
  const next = currentTheme() === "dark" ? "light" : "dark";
  userTheme = next; try { localStorage.setItem("hd-theme", next); } catch (e) {}
  applyTheme(next);
  if (window.mermaid) { window.mermaid = undefined; mermaidPromise = null; } // re-theme diagrams
  scheduleRerender();
});
document.getElementById("file-doc").addEventListener("change", e => {
  const f = e.target.files[0]; if (!f) return;
  f.text().then(t => renderDocument(t, f.name)); e.target.value = "";
});
document.getElementById("file-plugin").addEventListener("change", e => {
  for (const f of e.target.files) f.text().then(code => executePlugin(code, f.name));
  e.target.value = "";
});
["dragover", "dragenter"].forEach(ev => addEventListener(ev, e => { e.preventDefault(); document.body.classList.add("dragging"); }));
["dragleave", "drop"].forEach(ev => addEventListener(ev, e => { e.preventDefault(); document.body.classList.remove("dragging"); }));
addEventListener("drop", e => {
  for (const f of e.dataTransfer.files) {
    if (/\.js$/i.test(f.name)) f.text().then(code => executePlugin(code, f.name));
    else f.text().then(t => renderDocument(t, f.name));
  }
});

/* ?doc=URL support when served over http(s) */
if (/^https?:$/.test(location.protocol)) {
  const u = new URLSearchParams(location.search).get("doc");
  if (u) fetch(u).then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(t => renderDocument(t, u.split("/").pop()))
    .catch(e => { document.getElementById("doc").appendChild(errorBox("Could not load " + u + ": " + e.message)); show(document.getElementById("doc")); });
}
</script>
